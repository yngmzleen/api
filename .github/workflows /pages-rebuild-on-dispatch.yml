name: Rebuild GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [xml-published]
  workflow_dispatch:

concurrency:
  group: api-pages-rebuild
  cancel-in-progress: true

jobs:
  request-pages-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Ensure GitHub Pages is enabled on this repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/pages_cfg.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$code" != "200" ]; then
            echo "::error::Для репозитория не настроен GitHub Pages (GET /pages → HTTP ${code}). Без этого POST /pages/builds всегда даёт 403."
            echo "Настройка: откройте https://github.com/${{ github.repository }}/settings/pages"
            echo "→ Build and deployment → Source: Deploy from a branch → Branch: main, Folder: / (root) → Save."
            echo "После первой успешной публикации этот workflow сможет заказывать пересборки."
            cat /tmp/pages_cfg.json || true
            exit 1
          fi
          echo "GitHub Pages для репозитория включён."

      - name: Request Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds")
          echo "POST /pages/builds → HTTP ${code}"
          cat /tmp/r.json || true
          if [ "$code" != "201" ]; then
            echo "::error::Не удалось заказать сборку (ожидался HTTP 201)."
            exit 1
          fi
