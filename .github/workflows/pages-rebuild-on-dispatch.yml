name: Rebuild GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [xml-published]
  workflow_dispatch:

concurrency:
  group: api-pages-rebuild
  cancel-in-progress: true

jobs:
  request-pages-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Request Pages build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds")
          echo "POST /pages/builds → HTTP ${code}"
          cat /tmp/r.json || true
          if [ "$code" != "201" ]; then
            echo "::error::Не удалось заказать сборку GitHub Pages"
            exit 1
          fi
